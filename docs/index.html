<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marine Seismic Hazard-Chain Network</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<script src="graph-data.js"></script>
<style>
  :root{
    --trigger:#e4572e; --natural:#2a9d8f; --engineering:#e9a220; --consequence:#4a6fa5;
    --ink:#1f2933; --muted:#7b8794; --line:#e4e7eb; --bg:#f7f9fb;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI","Helvetica Neue",
       "PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--ink);background:var(--bg)}
  header{padding:22px 26px 14px;border-bottom:1px solid var(--line);background:#fff}
  h1{margin:0;font-size:20px;font-weight:700}
  header p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.5;max-width:980px}
  .bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 26px;background:#fff;
       border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
  .bar .sp{flex:1}
  button.tab,button.opt,button.lang{border:1px solid var(--line);background:#fff;color:var(--ink);
       padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;transition:.15s}
  button.tab:hover,button.opt:hover,button.lang:hover{border-color:#b8c2cc}
  button.tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  button.opt.on{background:#eef2f6;border-color:#b8c2cc;font-weight:600}
  button.lang{font-weight:600}
  .legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--muted)}
  .legend b{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  main{padding:16px 26px 30px}
  .view{display:none}
  .view.on{display:block}
  .net{width:100%;height:70vh;min-height:460px;background:#fff;border:1px solid var(--line);
       border-radius:12px}
  .pair{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .pair .cap{font-size:13px;font-weight:600;margin:0 0 6px;color:var(--ink)}
  .pair .net{height:64vh;min-height:420px}
  @media(max-width:820px){.pair{grid-template-columns:1fr}}
  #info{position:fixed;right:20px;bottom:20px;max-width:300px;background:#fff;border:1px solid var(--line);
       border-radius:12px;padding:14px 16px;box-shadow:0 8px 30px rgba(31,41,51,.12);font-size:13px;display:none}
  #info h3{margin:0 0 4px;font-size:15px}
  #info .tag{display:inline-block;font-size:11px;color:#fff;padding:2px 8px;border-radius:20px;margin-bottom:8px}
  #info .row{display:flex;justify-content:space-between;color:var(--muted);padding:2px 0}
  #info .row b{color:var(--ink);font-weight:600}
  #info .hint{margin-top:8px;color:var(--muted);font-size:12px}
  .foot{color:var(--muted);font-size:12px;padding:0 26px 24px}
  code{background:#eef2f6;padding:1px 5px;border-radius:4px}
</style>
</head>
<body>
<header>
  <h1 id="ttl"></h1>
  <p id="desc"></p>
</header>

<div class="bar">
  <button class="tab on" data-tab="t1" id="tab1"></button>
  <button class="tab" data-tab="t2" id="tab2"></button>
  <span class="sp"></span>
  <span style="font-size:12px;color:var(--muted)" id="lblColor"></span>
  <button class="opt on" data-color="layer" id="optLayer"></button>
  <button class="opt" data-color="degree" id="optDegree"></button>
  <button class="lang" id="langBtn"></button>
</div>

<div class="bar" style="top:57px;z-index:4">
  <div class="legend" id="legend">
    <span><b style="background:var(--trigger)"></b><span id="legT"></span></span>
    <span><b style="background:var(--natural)"></b><span id="legN"></span></span>
    <span><b style="background:var(--engineering)"></b><span id="legE"></span></span>
    <span><b style="background:var(--consequence)"></b><span id="legC"></span></span>
    <span style="margin-left:8px" id="legSize"></span>
  </div>
</div>

<main>
  <section class="view on" id="t1">
    <div id="net1" class="net"></div>
  </section>
  <section class="view" id="t2">
    <div class="pair">
      <div><p class="cap" id="cap2a"></p><div id="net2a" class="net"></div></div>
      <div><p class="cap" id="cap2b"></p><div id="net2b" class="net"></div></div>
    </div>
  </section>
</main>

<div id="info"></div>
<p class="foot" id="foot"></p>

<script>
/* ---------------- bilingual strings ---------------- */
const I18N={
  zh:{
    ttl:"海洋地震灾害链网络",
    desc:"基于 NHESS 论文数据的交互式复现。图 1 为 39 节点 / 152 条有向边的海洋灾害链细粒度网络;图 2 为统一到 15 个灾害类别后,海洋链与中国大陆链的对比。点击任意节点,与其直接相连的节点会高亮,其余节点变暗;再次点击空白处复位。",
    tab1:"图 1 · 海洋网络 (39 节点)", tab2:"图 2 · 海洋 vs 大陆 (15 类)",
    lblColor:"着色:", optLayer:"按层级", optDegree:"按度 (黄→红)",
    cap2a:"海洋链 · 15 类 (57 边)", cap2b:"中国大陆链 · 15 类 (47 边)",
    legSize:"节点大小 = 总度数 (入 + 出)",
    foot:"数据与分类体系来自海洋地震灾害链手稿(Shi, Hu & Zhang),使用 vis-network 渲染。点击节点可追踪其耦合关系。",
    out:"出度", inn:"入度", nb:"相连节点", hint:"点击空白处复位",
    langBtn:"EN",
    layer:{Trigger:"触发",Natural:"过程-自然",Engineering:"过程-工程",Consequence:"后果"}
  },
  en:{
    ttl:"Marine Seismic Hazard-Chain Network",
    desc:"An interactive reproduction of the network figures from the marine seismic hazard-chain study. Figure 1 is the fine-grained marine chain (39 nodes, 152 directed edges); Figure 2 compares the marine and mainland-China chains after aggregating to 15 hazard classes. Click any node to light up its directly connected nodes and dim the rest; click empty space to reset.",
    tab1:"Fig. 1 · Marine network (39 nodes)", tab2:"Fig. 2 · Marine vs Mainland (15 classes)",
    lblColor:"Colour:", optLayer:"By layer", optDegree:"By degree (yellow→red)",
    cap2a:"Marine chain · 15 classes (57 edges)", cap2b:"Mainland China chain · 15 classes (47 edges)",
    legSize:"Node size = total degree (in + out)",
    foot:"Data and taxonomy from the marine seismic hazard-chain manuscript (Shi, Hu & Zhang). Rendered with vis-network. Click a node to trace its couplings.",
    out:"Out-degree", inn:"In-degree", nb:"Neighbours", hint:"Click empty space to reset",
    langBtn:"中",
    layer:{Trigger:"Trigger",Natural:"Process-Natural",Engineering:"Process-Engineering",Consequence:"Consequence"}
  }
};
/* Chinese full names for each node id (English full name lives in graph-data.js) */
const ZH_NAME={
  SEQ:"海底地震",EQ:"沿海地震",AS:"余震",VE:"火山喷发",
  SLS:"海底滑坡",CLS:"海岸滑坡",LS:"滑坡",RO:"落石",LB:"溃湖/溃坝",SA:"雪崩",LI:"砂土液化",
  GU:"地面隆起",SUB:"地面沉降",MB:"甲烷喷发",TS:"海啸",CFL:"海岸洪水",FF:"河流洪水",
  MED:"海洋生态破坏",WP:"水体污染",WD:"用水困境",DI:"疫病",FA:"动植物资源损失",
  PHF:"港口/码头破坏",SDF:"海堤/堤坝破坏",SPF:"海底管线破坏",SCF:"海底电缆破坏",
  NFA:"核设施事故",FI:"火灾",EX:"爆炸",CF:"关键基础设施破坏",NF:"关键网络破坏",
  MTD:"海运中断",BI:"商业中断",EC:"经济危机",PP:"人身与心理创伤",HD:"医疗系统退化",
  IR:"救援不足",SU:"社会动荡",CP:"文化受损",
  "EQ or AS":"地震/余震","Mass Slide":"崩滑体","Flood":"洪涝","Water Dil.":"用水困境",
  "Flora an Fauna":"动植物","Disease":"疫病","Critical Infra. Fail.":"关键基础设施破坏",
  "Critical NET Fail.":"关键网络破坏","Fire":"火灾","Business Interr.":"商业中断",
  "Healthcare Deg.":"医疗系统退化","Econ. Crisis":"经济危机","Phy.-Psych. Trauma":"人身与心理创伤",
  "Culture Perils":"文化受损","Social Unrest":"社会动荡"
};

let lang = (navigator.language||'').toLowerCase().startsWith('zh') ? 'zh' : 'en';
const T=()=>I18N[lang];
const fullName=n => lang==='zh' ? (ZH_NAME[n.id]||n.full) : n.full;
const layerName=l => T().layer[l]||l;
const nodeTitle=n => `${fullName(n)}\n${layerName(n.layer)} · in ${n.in} / out ${n.out}`;

/* ---------------- network rendering ---------------- */
const LAYER_COLORS={Trigger:'#e4572e',Natural:'#2a9d8f',Engineering:'#e9a220',Consequence:'#4a6fa5'};
const DIM_NODE='rgba(155,165,175,0.18)', DIM_FONT='#c3cbd3', DIM_EDGE='rgba(190,197,204,0.12)';
function degColor(t){const a=[255,248,134],b=[210,29,19];
  const c=a.map((v,i)=>Math.round(v+(b[i]-v)*t));return `rgb(${c[0]},${c[1]},${c[2]})`;}
let colorMode='layer';
const NETS={};
function baseNodeColor(n,maxDeg){
  if(colorMode==='degree'){const t=maxDeg?(n.in+n.out)/maxDeg:0;return degColor(t);}
  return LAYER_COLORS[n.layer]||'#888';
}
function buildNet(containerId,key){
  const raw=GRAPHS[key];
  const maxDeg=Math.max(...raw.nodes.map(n=>n.in+n.out),1);
  const nodes=new vis.DataSet(raw.nodes.map(n=>({
    id:n.id,label:n.label,title:nodeTitle(n),value:n.in+n.out+1,
    color:{background:baseNodeColor(n,maxDeg),border:'#ffffff',
           highlight:{background:baseNodeColor(n,maxDeg),border:'#1f2933'}},
    font:{color:'#1f2933',size:15,face:'Helvetica',strokeWidth:3,strokeColor:'#fff'}
  })));
  const edges=new vis.DataSet(raw.edges.map((e,i)=>({
    id:i,from:e.from,to:e.to,
    color:{color:'rgba(120,132,144,0.45)',highlight:'#e4572e'},
    arrows:{to:{enabled:true,scaleFactor:0.5}},
    smooth:{type:'continuous',roundness:0.2}
  })));
  const network=new vis.Network(document.getElementById(containerId),{nodes,edges},{
    physics:{enabled:true,
             barnesHut:{gravitationalConstant:-3000,springLength:130,springConstant:0.05,
                        centralGravity:0.30,damping:0.55,avoidOverlap:0.35},
             stabilization:{enabled:true,iterations:300,updateInterval:30,fit:true},
             maxVelocity:28,minVelocity:2,timestep:0.4},
    nodes:{shape:'dot',scaling:{min:10,max:40,label:{enabled:true,min:12,max:20}},borderWidth:2},
    edges:{width:1.1,selectionWidth:2.5},
    interaction:{hover:true,tooltipDelay:120,dragNodes:true,navigationButtons:false}
  });
  const freeze=()=>network.setOptions({physics:false});
  network.once('stabilizationIterationsDone',()=>{freeze();network.fit();});
  setTimeout(freeze,4500);
  const ctx={network,nodes,edges,raw,maxDeg,selected:null};
  network.on('click',p=>{
    if(p.nodes.length){highlight(ctx,p.nodes[0]);showInfo(ctx,p.nodes[0]);}
    else{reset(ctx);hideInfo();}
  });
  NETS[key]=ctx;return ctx;
}
function highlight(ctx,id){
  ctx.selected=id;
  const conn=new Set(ctx.network.getConnectedNodes(id));conn.add(id);
  ctx.nodes.update(ctx.raw.nodes.map(n=>{
    const on=conn.has(n.id);
    return {id:n.id,
      color:{background:on?baseNodeColor(n,ctx.maxDeg):DIM_NODE,
             border:on?(n.id===id?'#1f2933':'#ffffff'):'rgba(0,0,0,0)'},
      font:{color:on?'#1f2933':DIM_FONT,size:15,strokeWidth:3,strokeColor:'#fff'}};
  }));
  ctx.edges.update(ctx.raw.edges.map((e,i)=>{
    const on=(e.from===id||e.to===id);
    return {id:i,color:{color:on?'#e4572e':DIM_EDGE},width:on?2.6:0.6,
            arrows:{to:{enabled:true,scaleFactor:on?0.6:0.35}}};
  }));
}
function reset(ctx){
  ctx.selected=null;
  ctx.nodes.update(ctx.raw.nodes.map(n=>({id:n.id,
    color:{background:baseNodeColor(n,ctx.maxDeg),border:'#ffffff'},
    font:{color:'#1f2933',size:15,strokeWidth:3,strokeColor:'#fff'}})));
  ctx.edges.update(ctx.raw.edges.map((e,i)=>({id:i,
    color:{color:'rgba(120,132,144,0.45)'},width:1.1,
    arrows:{to:{enabled:true,scaleFactor:0.5}}})));
}
function recolorAll(){Object.values(NETS).forEach(c=>c.selected?highlight(c,c.selected):reset(c));}

const info=document.getElementById('info');
let infoCtx=null,infoId=null;
function showInfo(ctx,id){
  infoCtx=ctx;infoId=id;
  const n=ctx.raw.nodes.find(x=>x.id===id);
  const conn=ctx.network.getConnectedNodes(id).length;
  info.innerHTML=`<h3>${n.label} · ${fullName(n)}</h3>`+
    `<span class="tag" style="background:${LAYER_COLORS[n.layer]}">${layerName(n.layer)}</span>`+
    `<div class="row"><span>${T().out}</span><b>${n.out}</b></div>`+
    `<div class="row"><span>${T().inn}</span><b>${n.in}</b></div>`+
    `<div class="row"><span>${T().nb}</span><b>${conn}</b></div>`+
    `<div class="hint">${T().hint}</div>`;
  info.style.display='block';
}
function hideInfo(){info.style.display='none';infoCtx=null;infoId=null;}

/* ---------------- i18n apply ---------------- */
function setTxt(id,v){document.getElementById(id).textContent=v;}
function applyLang(){
  document.documentElement.lang = lang;
  const t=T();
  setTxt('ttl',t.ttl); setTxt('desc',t.desc);
  setTxt('tab1',t.tab1); setTxt('tab2',t.tab2);
  setTxt('lblColor',t.lblColor); setTxt('optLayer',t.optLayer); setTxt('optDegree',t.optDegree);
  setTxt('cap2a',t.cap2a); setTxt('cap2b',t.cap2b);
  setTxt('legT',t.layer.Trigger); setTxt('legN',t.layer.Natural);
  setTxt('legE',t.layer.Engineering); setTxt('legC',t.layer.Consequence);
  setTxt('legSize',t.legSize); setTxt('foot',t.foot); setTxt('langBtn',t.langBtn);
  // refresh node tooltips in the new language
  Object.values(NETS).forEach(c=>c.nodes.update(c.raw.nodes.map(n=>({id:n.id,title:nodeTitle(n)}))));
  // refresh open info panel
  if(infoCtx&&infoId!=null) showInfo(infoCtx,infoId);
}

/* ---------------- controls ---------------- */
document.querySelectorAll('button.tab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('button.tab').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById(b.dataset.tab).classList.add('on');
  hideInfo();
  Object.values(NETS).forEach(c=>{c.network.redraw();c.network.fit();});
});
document.querySelectorAll('button.opt').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('button.opt').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');colorMode=b.dataset.color;
  document.getElementById('legend').style.opacity=colorMode==='layer'?1:0.5;
  recolorAll();
});
document.getElementById('langBtn').onclick=()=>{lang=(lang==='zh')?'en':'zh';applyLang();};

/* ---------------- build ---------------- */
buildNet('net1','fig1');
buildNet('net2a','marine15');
buildNet('net2b','mainland15');
applyLang();
</script>
</body>
</html>
